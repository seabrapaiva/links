		body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;        }
        #lock-screen {
            text-align: center;
            background: #2d2d2d;
            padding: 40px;
            width: 200px;
            border-radius: 15px; 
			justify-content: center;
			align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            width: 200px;
            text-align: center;
            margin-bottom: 20px;}
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;}
        button:hover {
            background-color: #0056b3;}
        .error-msg {
            color: #ff4d4d;
            margin-top: 15px;
            display: none;}
        #protected-content {
            display: none; /* Stays hidden until unlocked */
            text-align: center;}
		.opt1 {background: grey;}
		.opt2 {background: blue;}
		.opt3 {background: brown;}
		.opt4 {background: lightblue;}
		.opt5 {background: red;}
		.opt6 {background: green;}
		.btn {
			padding: 10px; 
			text-align: center; 
			border: 3px solid #ddd; 
			border-radius: 15px; 
			text-decoration: none; 
			color: #333; 
			font-weight: bold; 
			transition: 0.2s;
			font-size: 50px;
			}
		.btn:hover { 
			border-color: #007bff;
			background: #f0f7ff; 
			transform: translateY(-2px); 
		}
		</style>
</head>

    <div id="lock-screen">        
        <h2>CÓDIGO</h2>
        <input type="password" id="code-input" placeholder="****">
        <br><h5>SeabraPaiva @ 2024</h5><br>
        <button onclick="verifyCode()">DESBLOQUEAR</button>
        <p id="error" class="error-msg">Erradissimo, tenta de novo</p>
    </div>

    <div id="protected-content">
		<br><br><div class="container1"><div id="link-grid1" class="grid"></div></div>
		<hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">

    <script>
		//const _0x4a21 = "MTIzNDQzMjE="; 
		const _0x4a21 = "MTIzNA==";

		function verifyCode() {
			const input = document.getElementById('code-input').value;
			const error = document.getElementById('error');
			const decoded = atob(_0x4a21);
			if (input === decoded) {
				document.getElementById('lock-screen').style.display = "none";
				document.getElementById('protected-content').style.display = "block";
			} else {
				error.style.display = "block";
				document.getElementById('code-input').value = "";
			}
		}

		document.getElementById('code-input').addEventListener('keypress', (e) => {
			if (e.key === 'Enter') verifyCode();
		});
	</script>
